<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneio José Magalhães 2026 — Disco Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #000000; --white: #ffffff; --grey: #1a1a1a; --grey-mid: #2a2a2a; --grey-border: #333333; --grey-muted: #666666; --gold: #c8a84b; --spotify: #1db954; }
    body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }
    @keyframes shimmer { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes pop-in { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    .page { max-width: 460px; margin: 0 auto; padding: 0 20px 48px; }
    .site-header { text-align: center; padding: 36px 20px 28px; animation: shimmer .5s ease both; }
    .header-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .header-logo { width: 72px; height: 72px; margin: 0 auto 14px; display: block; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: .06em; line-height: 1; }
    .header-title span { color: var(--gold); }
    .header-sub { font-size: 13px; color: var(--grey-muted); margin-top: 8px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--grey-border); }
    .divider-icon { color: var(--gold); font-size: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--grey-muted); margin-bottom: 6px; }
    input[type=text], input[type=password] { width: 100%; background: var(--grey); border: 1px solid var(--grey-border); border-radius: 8px; padding: 13px 16px; color: var(--white); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; }
    input[type=text]:focus, input[type=password]:focus { border-color: var(--white); }
    input::placeholder { color: #444; }
    .search-wrap { position: relative; }
    .search-wrap input { padding-right: 44px; }
    .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--grey-muted); font-size: 15px; pointer-events: none; }
    .track { display: flex; align-items: center; gap: 12px; background: var(--grey); border: 1px solid var(--grey-border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s, background .15s; }
    .track:hover { border-color: var(--white); background: #1f1f1f; }
    .track-thumb { width: 46px; height: 46px; border-radius: 6px; flex-shrink: 0; background: var(--grey-mid); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .track-thumb img { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; }
    .track-info { flex: 1; min-width: 0; }
    .track-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 12px; color: var(--grey-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-album { font-size: 11px; color: #444; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-request { background: var(--white); border: none; border-radius: 6px; color: var(--black); padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; font-family: 'Inter', sans-serif; transition: background .15s; }
    .btn-request:hover { background: var(--gold); }
    .msg-error { color: #e05252; font-size: 13px; margin-bottom: 10px; }
    .msg-loading { color: var(--grey-muted); font-size: 13px; margin-bottom: 10px; text-align: center; }
    .empty-state { text-align: center; padding: 40px 0; color: var(--grey-muted); }
    .empty-state .e { font-size: 28px; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }
    .success-card { border: 1px solid var(--white); border-radius: 12px; padding: 32px 24px; text-align: center; animation: shimmer .4s ease both; }
    .success-card .s-icon { font-size: 36px; margin-bottom: 12px; }
    .success-card .s-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: .06em; }
    .success-card .s-sub { color: var(--grey-muted); margin-top: 8px; font-size: 13px; }
    .hidden-switch { display: block; margin: 48px auto 0; background: transparent; border: none; color: #555; cursor: pointer; font-size: 16px; padding: 12px; }
    .dj-topbar { display: flex; align-items: flex-start; justify-content: space-between; padding: 28px 20px 20px; }
    .dj-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: .06em; }
    .dj-sub { font-size: 12px; color: var(--grey-muted); margin-top: 3px; }
    .dj-actions { display: flex; gap: 8px; }
    .btn-icon { background: var(--grey); border: 1px solid var(--grey-border); border-radius: 8px; color: var(--white); padding: 7px 12px; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
    .btn-danger { background: transparent; border: 1px solid #3a2020; border-radius: 8px; color: #e05252; padding: 7px 12px; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
    .filters { display: flex; gap: 6px; padding: 0 20px 16px; }
    .filter-btn { background: var(--grey); border: 1px solid var(--grey-border); border-radius: 6px; color: var(--grey-muted); padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; transition: all .15s; }
    .filter-btn.active { background: var(--white); border-color: var(--white); color: var(--black); }
    .dj-list { padding: 0 20px; }
    .req-card { display: flex; align-items: center; gap: 12px; background: var(--grey); border: 1px solid var(--grey-border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
    .req-card.played { opacity: .4; border-color: #222; }
    .req-thumb { width: 46px; height: 46px; border-radius: 6px; flex-shrink: 0; background: var(--grey-mid); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .req-thumb img { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; }
    .req-info { flex: 1; min-width: 0; }
    .req-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
    .req-artist { font-size: 12px; color: var(--grey-muted); margin-top: 1px; }
    .req-meta { font-size: 11px; color: #444; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .req-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .btn-played { background: var(--white); border: none; border-radius: 6px; color: var(--black); padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-played:hover { background: var(--gold); }
    .btn-remove { background: transparent; border: 1px solid #3a2020; border-radius: 6px; color: #e05252; padding: 5px 10px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; }
    .back-link { display: block; text-align: center; margin: 24px auto 0; background: transparent; border: none; color: #333; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 280px; text-align: center; }
    .login-box .login-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: .06em; margin-bottom: 24px; }
    .btn-login { width: 100%; background: var(--white); border: none; border-radius: 8px; color: var(--black); padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
    .btn-login:hover { background: var(--gold); }
    .new-badge { display: inline-block; background: var(--gold); color: var(--black); font-size: 9px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; border-radius: 4px; padding: 2px 6px; margin-left: 6px; vertical-align: middle; animation: pop-in .3s ease both; }
    .count-badge { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); min-width: 32px; text-align: center; flex-shrink: 0; }
    .count-spacer { min-width: 32px; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="view-guest" style="display:block">
  <div class="site-header">
    <div class="header-eyebrow">Torneio José Magalhães 2026</div>
    <img class="header-logo" src="/logo.png" alt="GSC" />
    <div class="header-title">Disco <span>Night</span></div>
    <div class="header-sub">Guifões Sport Clube</div>
  </div>
  <div class="page">
    <div id="guest-form">
      <div class="field"><label>O teu nome</label><input type="text" id="inp-name" placeholder="Opcional" /></div>
      <div class="field"><label>Equipa</label><input type="text" id="inp-team" placeholder="Opcional" /></div>
      <div class="divider"><span class="divider-icon">🎵</span></div>
      <div class="field">
        <label>Música</label>
        <div class="search-wrap">
          <input type="text" id="inp-search" placeholder="Nome da música ou artista…" autocomplete="off" />
          <div class="search-icon" id="search-icon">🔍</div>
        </div>
      </div>
      <div id="search-error" class="msg-error" style="display:none"></div>
      <div id="search-loading" class="msg-loading" style="display:none">A pesquisar…</div>
      <div id="results"></div>
      <div class="empty-state" id="empty-state"><div class="e">🎧</div><p>Começa a escrever para pesquisar</p></div>
    </div>
    <div id="guest-success" style="display:none" class="success-card">
      <div class="s-icon">🎶</div>
      <div class="s-title">Pedido enviado!</div>
      <div class="s-sub" id="success-msg"></div>
    </div>
    <button class="hidden-switch" onclick="showLogin()">···</button>
  </div>
</div>

<div id="view-login" style="display:none">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-title">🎛 Painel DJ</div>
      <div class="field"><input type="password" id="inp-pw" placeholder="Palavra-passe" style="text-align:center" onkeydown="if(event.key==='Enter') checkPw()" /></div>
      <div id="pw-error" class="msg-error" style="display:none;text-align:center">Código errado</div>
      <button class="btn-login" onclick="checkPw()">Entrar</button>
    </div>
  </div>
</div>

<div id="view-dj" style="display:none">
  <div class="dj-topbar">
    <div><div class="dj-title">🎛 Painel DJ</div><div class="dj-sub" id="dj-sub">A carregar…</div></div>
    <div class="dj-actions">
      <button class="btn-icon" onclick="loadDJ()">↻</button>
      <button class="btn-danger" onclick="clearAll()">Limpar</button>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter(this,'all')">Todos</button>
    <button class="filter-btn" onclick="setFilter(this,'pending')">Por tocar</button>
    <button class="filter-btn" onclick="setFilter(this,'played')">Tocados</button>
  </div>
  <div class="dj-list" id="dj-list"></div>
  <button class="back-link" onclick="showView('guest')">← Vista pública</button>
</div>

<script>
  const DJ_PASSWORD = 'dj2025';
  let djFilter = 'all', djInterval = null, allRequests = [], searchTimer = null, prevCount = 0;

  function showView(v) {
    ['guest','login','dj'].forEach(n => document.getElementById('view-'+n).style.display = 'none');
    document.getElementById('view-'+v).style.display = 'block';
    if (v === 'dj') { loadDJ(); djInterval = setInterval(loadDJ, 3000); }
    else clearInterval(djInterval);
  }
  function showLogin() { showView('login'); }
  function checkPw() {
    if (document.getElementById('inp-pw').value === DJ_PASSWORD) { document.getElementById('pw-error').style.display='none'; showView('dj'); }
    else document.getElementById('pw-error').style.display='block';
  }

  document.getElementById('inp-search').addEventListener('input', function() {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    if (q.length < 2) {
      document.getElementById('results').innerHTML='';
      document.getElementById('empty-state').style.display='block';
      document.getElementById('search-error').style.display='none';
      document.getElementById('search-loading').style.display='none';
      document.getElementById('search-icon').textContent='🔍';
      return;
    }
    document.getElementById('empty-state').style.display='none';
    document.getElementById('search-loading').style.display='block';
    document.getElementById('search-icon').textContent='⟳';
    searchTimer = setTimeout(() => doSearch(q), 500);
  });

  async function doSearch(q) {
    try {
      const res = await fetch('/api/spotify?q=' + encodeURIComponent(q));
      const tracks = await res.json();
      document.getElementById('search-loading').style.display='none';
      document.getElementById('search-icon').textContent='🔍';
      document.getElementById('search-error').style.display='none';
      renderResults(tracks);
    } catch {
      document.getElementById('search-loading').style.display='none';
      document.getElementById('search-icon').textContent='🔍';
      const el = document.getElementById('search-error');
      el.textContent='Erro na pesquisa. Tenta novamente.';
      el.style.display='block';
    }
  }

  function renderResults(tracks) {
    const el = document.getElementById('results');
    if (!tracks.length) { el.innerHTML=''; const err=document.getElementById('search-error'); err.textContent='Nenhum resultado encontrado.'; err.style.display='block'; return; }
    el.innerHTML = tracks.map(t => `
      <div class="track" onclick="requestTrack(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <div class="track-thumb">${t.image?`<img src="${t.image}" alt="">`:'🎵'}</div>
        <div class="track-info">
          <div class="track-name">${esc(t.name)}</div>
          <div class="track-artist">${esc(t.artist)}</div>
          <div class="track-album">${esc(t.album)}</div>
        </div>
        <button class="btn-request">Pedir</button>
      </div>`).join('');
  }

  async function requestTrack(track) {
    const name = document.getElementById('inp-name').value.trim() || 'Anónimo';
    const team = document.getElementById('inp-team').value.trim();
    await fetch('/api/requests', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({track, requester:name, team}) });
    document.getElementById('guest-form').style.display='none';
    document.getElementById('guest-success').style.display='block';
    document.getElementById('success-msg').textContent = `"${track.name}" — ${track.artist}${team?' · '+team:''}`;
    setTimeout(() => {
      document.getElementById('guest-form').style.display='block';
      document.getElementById('guest-success').style.display='none';
      document.getElementById('inp-search').value='';
      document.getElementById('results').innerHTML='';
      document.getElementById('empty-state').style.display='block';
    }, 3000);
  }

  async function loadDJ() {
    const res = await fetch('/api/requests');
    allRequests = await res.json();
    allRequests.reverse();
    const pending = allRequests.filter(r => !r.played).length;
    const isNew = allRequests.length > prevCount; prevCount = allRequests.length;
    document.getElementById('dj-sub').innerHTML = `Atualiza a cada 3 seg · ${pending} por tocar`+(isNew&&pending>0?' <span class="new-badge">Novo</span>':'');
    renderDJ();
  }

  function setFilter(btn, f) {
    djFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderDJ();
  }

  function renderDJ() {
    const filtered = allRequests.filter(r => djFilter==='all'?true:djFilter==='pending'?!r.played:r.played);
    const el = document.getElementById('dj-list');
    if (!filtered.length) { el.innerHTML=`<div class="empty-state"><div class="e">🎵</div><p>Nenhum pedido ainda</p></div>`; return; }

    // Agrupar por track id
    const groups = [];
    filtered.forEach(r => {
      const existing = groups.find(g => g.track.id === r.track.id && g.played === r.played);
      if (existing) {
        existing.count++;
        existing.requesters.push(r.requester + (r.team ? ' · ' + r.team : ''));
        existing.ids.push(r.id);
      } else {
        groups.push({ track: r.track, played: r.played, count: 1, requesters: [r.requester + (r.team ? ' · ' + r.team : '')], ids: [r.id], time: r.time });
      }
    });

    el.innerHTML = groups.map(g => `
      <div class="req-card ${g.played?'played':''}">
        ${g.count > 1 ? `<div class="count-badge">${g.count}</div>` : '<div class="count-spacer"></div>'}
        <div class="req-thumb">${g.track.image?`<img src="${g.track.image}" alt="">`:'🎵'}</div>
        <div class="req-info">
          <div class="req-name">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.track.name)}</span>
            <button onclick="navigator.clipboard.writeText('${esc(g.track.name)} ${esc(g.track.artist)}');this.textContent='✓';setTimeout(()=>this.textContent='⎘',1500)" style="background:transparent;border:1px solid #333;border-radius:4px;color:#666;padding:2px 6px;cursor:pointer;font-size:10px;flex-shrink:0">⎘</button>
          </div>
          <div class="req-artist">${esc(g.track.artist)}</div>
          <div class="req-meta">${g.requesters.map(r=>esc(r)).join(' · ')} · ${g.time}</div>
        </div>
        <div class="req-actions">
          ${!g.played?`<button class="btn-played" onclick="markAllPlayed(${JSON.stringify(g.ids)})">✓ Tocou</button>`:''}
          <button class="btn-remove" onclick="removeAll(${JSON.stringify(g.ids)})">✕</button>
        </div>
      </div>`).join('');
  }

  async function markPlayed(id) { await fetch('/api/requests?id='+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({played:true})}); loadDJ(); }
  async function removeReq(id) { await fetch('/api/requests?id='+id,{method:'DELETE'}); loadDJ(); }
  async function markAllPlayed(ids) { await Promise.all(ids.map(id => fetch('/api/requests?id='+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({played:true})}))); loadDJ(); }
  async function removeAll(ids) { await Promise.all(ids.map(id => fetch('/api/requests?id='+id,{method:'DELETE'}))); loadDJ(); }
  async function clearAll() { if(!confirm('Limpar todos os pedidos?'))return; await fetch('/api/requests?id=all',{method:'DELETE'}); loadDJ(); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
